<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Serin</title>
    <!--
      ENG-136 "Ranin" theme bootstrap (PR-D). Runs before the module bundle to set
      data-theme on <html> pre-paint (no FOUC). Mirrors useTheme's resolution EXACTLY
      (same localStorage key `msg:theme`, same 'system'→prefers-color-scheme fallback)
      so the pre-paint attribute matches what the reactive store applies on hydration.
    -->
    <script>
      ;(function () {
        try {
          var pref = null
          try {
            pref = window.localStorage.getItem('msg:theme')
          } catch (e) {
            pref = null
          }
          var resolved =
            pref === 'light' || pref === 'dark'
              ? pref
              : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
          document.documentElement.setAttribute('data-theme', resolved)
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light')
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
