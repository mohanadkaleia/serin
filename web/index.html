<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>msg</title>
    <!--
      ENG-136 "Ranin" theme bootstrap (PR-A). Runs before the module bundle to
      set data-theme on <html> pre-paint (no FOUC). PINNED TO LIGHT for PR-A:
      dark mode is not enabled until PR-D, so the app must look byte-identical to
      today. PR-D will replace this with: read localStorage['msg:theme'] and, when
      'system' (or unset), resolve via matchMedia('(prefers-color-scheme: dark)').
    -->
    <script>
      document.documentElement.setAttribute('data-theme', 'light')
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
