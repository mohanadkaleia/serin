# Alembic config for msgd. The database URL here is a placeholder — the real
# URL always comes from the environment (MSG_DATABASE_URL) via env.py / the
# programmatic Config built in msgd/db/migrate.py. Startup and tests call
# msgd.db.migrate.run_migrations() rather than shelling out to `alembic`.
[alembic]
script_location = msgd/db/migrations
prepend_sys_path = .
path_separator = os
sqlalchemy.url = postgresql+asyncpg://placeholder/placeholder

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
