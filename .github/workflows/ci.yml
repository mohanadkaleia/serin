name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: lint · type · test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up uv (with Python 3.12)
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync workspace
        run: uv sync --locked

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy

      # permanent M0 exit gate, never remove (TDD §5)
      - name: Equivalence gate (rebuild ≡ incremental)
        run: uv run pytest cli/tests/test_equivalence_gate.py -q
        env:
          CI: "true"

      # Warm the image cache so the session-scoped testcontainer (server
      # integration tests, ENG-63) starts predictably rather than paying a cold
      # pull inside the 30 s readiness budget. Docker is preinstalled on
      # ubuntu-latest; no separate job is needed.
      - name: Pre-pull Postgres image
        run: docker pull postgres:17

      # permanent M1 exit gate, never remove (TDD §5, §12 invariant 6, server side).
      # Runs after the Postgres pre-pull so the session-scoped testcontainer starts
      # warm. Sibling of the M0 CLI gate above (which is Docker-free) — kept a
      # separate named step so "CLI gate red" vs "server gate red" are distinct
      # diagnoses; the CLI gate step stays byte-for-byte untouched.
      - name: Equivalence gate (server · rebuild ≡ incremental)
        run: uv run pytest server/tests/test_equivalence_gate_server.py -q
        env:
          CI: "true"

      # Runs the full suite, including the server integration tests, which spin
      # an ephemeral Postgres via testcontainers (Docker present on the runner).
      # Excludes server/tests/simulation — the heavy hypothesis sim runs ONLY in
      # its dedicated derandomized step below, so it is not paid for twice (R3).
      - name: Pytest
        run: uv run pytest --ignore=server/tests/simulation

      # ENG-71: the §12 convergence acceptance harness — the skeleton of the M2
      # go/no-go gate (TDD §13). Separately visible + timed (not folded into
      # Pytest) and derandomized via CI=true (bounded max_examples, sized <2 min).
      # Reuses the already-warmed Postgres testcontainer image. This step is
      # SEPARATE from and append-only relative to the ENG-69 equivalence-gate step
      # (COORDINATION ruling); a merge collision rebases this single block.
      - name: Simulation suite
        run: uv run pytest server/tests/simulation -q
        env:
          CI: "true"

  # Image build + compose validation (ENG-72). Runs in parallel with `checks`.
  # Deliberately does NOT run `compose up`: a live migrate→serve cycle is the
  # ENG-73 M1 exit gate, and duplicating it here would cost runner time + flake
  # for coverage that gate already owns (plan D8).
  image:
    name: docker build · compose config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Advisory Dockerfile lint. Pinned by digest per our image-pinning
      # convention; non-blocking (if a rule fires it surfaces without gating).
      - name: Hadolint (advisory)
        continue-on-error: true
        run: |
          docker run --rm -i \
            hadolint/hadolint:v2.12.0@sha256:30a8fd2e785ab6176eed53f74769e04f125afb2f74a6c52aef7d463583b6d45e \
            hadolint - < Dockerfile

      - name: Build image
        run: docker build -t msg/server:ci .

      # Proves the msgctl console script is on PATH in the runtime image
      # (acceptance criterion). The image ENTRYPOINT is the migrate→serve script
      # and ignores its args, so override it to invoke msgctl directly. No DB.
      - name: Smoke — msgctl --version
        run: docker run --rm --entrypoint msgctl msg/server:ci --version

      # `docker compose config` interpolates ${...}; feed dummy secrets so it
      # validates instead of failing on empties.
      - name: Validate compose config
        run: docker compose config
        env:
          POSTGRES_PASSWORD: ci
          MSG_SECRET_KEY: ci

  # Web client CI (ENG-75, plan D-5). A separate Node/pnpm world, sibling to
  # `checks` (uv/Python) and `image` (docker) — parallel jobs keep each toolchain
  # fast and give distinct red/green signals ("python red" vs "web red"). Runs
  # the D-3 script pipeline against web/ (the contract). No Playwright/e2e here;
  # that lands with ENG-83 (browsers + live server). This job goes RED until the
  # web/ tree exists on the branch — it is designed to land together with the
  # ui-engineer's web/ scaffold PR.
  web:
    name: web · lint · type · test · build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Activate the pnpm pinned in web/package.json "packageManager" via Corepack
      # (bundled with Node). Must run BEFORE the store-path step so `pnpm` is on
      # PATH; also before setup-node is fine — Node itself ships Corepack.
      - name: Enable Corepack
        run: corepack enable

      # No `cache: 'pnpm'` here on purpose. setup-node's built-in pnpm cache
      # resolves the store path from the repo ROOT before `pnpm install` has ever
      # run, so the cache-save post-step finds a nonexistent path and (in v6)
      # FAILS the job: "Path Validation Error ... do(es) not exist". We drive the
      # cache explicitly below instead (compute store path after pnpm is live,
      # then actions/cache, which WARNS — not fails — on a missing path).
      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      # Resolve the real pnpm store path now that pnpm is on PATH (Corepack).
      # `--silent` keeps the output to just the path so it is safe to capture.
      - name: Locate pnpm store
        working-directory: web
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      # Explicit dependency cache. actions/cache tolerates a missing path on save
      # (warns, no failure), unlike setup-node's built-in pnpm cache.
      - name: Cache pnpm store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install (frozen)
        working-directory: web
        run: pnpm install --frozen-lockfile

      # ENG-167 (M6-3): the headless workspace-mirror gate
      # (tests/integration/m6-workspace-mirror.spec.ts, part of `pnpm test`)
      # spawns the REAL `msgctl verify` via `uv run --project <repo>`, so this
      # Node job also needs uv. The spec HARD-FAILS under CI when uv is absent
      # (it must never silently skip), so removing this step turns the job red.
      - name: Set up uv (for msgctl verify in the M6 mirror gate)
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Lint
        working-directory: web
        run: pnpm lint

      - name: Format check
        working-directory: web
        run: pnpm format:check

      - name: Typecheck
        working-directory: web
        run: pnpm typecheck

      - name: Unit tests
        working-directory: web
        run: pnpm test

      # ENG-83: the §12 hard gate's CLIENT half, made a separately-visible signal
      # so "invariant suite red" is a distinct diagnosis from a generic web-test
      # failure. Invariant 5 (pending settling) + invariant 6 CLIENT (Dexie
      # rebuild ≡ incremental) as fast-check property suites driving the REAL
      # WorkerCore/outbox/projection/db. These files also run inside `pnpm test`
      # above; this step re-runs ONLY them for the named gate. The other four
      # invariants (1–4 + the SERVER half of 6) are gated by the `checks` job's
      # "Simulation suite" + "Equivalence gate" steps — the two jobs green
      # together IS "all six §12 invariants green in CI" (the M2/M3 hard gate).
      - name: Invariant suite (§12 — pending-settling + client rebuild)
        working-directory: web
        run: pnpm test tests/unit/worker/invariant5-pending-settling.property.spec.ts tests/unit/worker/invariant6-client-rebuild.property.spec.ts

      # ENG-167 (M6-3): the headless workspace-mirror gate, re-run as its own
      # named signal (same pattern as the invariant suite above — the file also
      # runs inside `pnpm test`). Drives the REAL SyncEngine+WorkerCore in
      # full-mirror mode (SqliteDb + Node-fs seams) into a temp dir, then spawns
      # the REAL `msgctl verify --json` (via the uv step above) and asserts
      # exit 0 — plus rebuild-from-disk ≡ incremental and crash-resume
      # convergence. §12 invariant 6 EXTENDED to the on-disk NDJSON log.
      - name: M6 workspace-mirror gate (msgctl verify exit 0)
        working-directory: web
        run: pnpm test tests/integration/m6-workspace-mirror.spec.ts

      - name: Build
        working-directory: web
        run: pnpm build

  # Playwright golden paths (TDD §12/§13): the ENG-83 smoke (login → send → reload
  # → history intact → a SECOND browser sees the message live via WS fanout) AND
  # the ENG-105 messaging-core golden path (react → edit → delete → thread reply →
  # @mention → create channel → start DM, with a second browser seeing message +
  # reaction + thread reply live). `pnpm e2e` runs every tests/e2e/*.spec.ts, so
  # both are covered by this one job. Drives the REAL production stack — a real
  # msgd server (Postgres testcontainer + subprocess uvicorn) serving the built SPA
  # + /v1 + /v1/ws from one origin, on uvicorn's DEFAULT ws backend (ENG-92). Its
  # OWN job because it is heavier (browsers + a live server + Docker) than the unit
  # signal; keeping it separate preserves fast red/green on the unit + python jobs.
  # Needs BOTH toolchains: uv (msgd/msgctl/testcontainers) and Node/pnpm (build +
  # Playwright).
  e2e:
    name: e2e · golden path (§12 smoke)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up uv (with Python 3.12)
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync workspace
        run: uv sync --locked

      # Warm the Postgres image so the serverctl testcontainer starts fast.
      - name: Pre-pull Postgres image
        run: docker pull postgres:17

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Locate pnpm store
        working-directory: web
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install (frozen)
        working-directory: web
        run: pnpm install --frozen-lockfile

      # Chromium + its OS deps for headless Playwright.
      - name: Install Playwright chromium
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium

      # global-setup builds the SPA + boots the real server harness (owner +
      # #general + an invited second member); the specs run the ENG-83 smoke + the
      # ENG-105 messaging-core golden path. CI=true is set by GitHub Actions.
      - name: Golden paths (smoke + messaging core)
        working-directory: web
        run: pnpm e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: |
            web/playwright-report/
            web/test-results/
          retention-days: 7
