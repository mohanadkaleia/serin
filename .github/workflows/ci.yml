name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: lint · type · test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up uv (with Python 3.12)
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync workspace
        run: uv sync --locked

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy

      # permanent M0 exit gate, never remove (TDD §5)
      - name: Equivalence gate (rebuild ≡ incremental)
        run: uv run pytest cli/tests/test_equivalence_gate.py -q
        env:
          CI: "true"

      - name: Pytest
        run: uv run pytest
